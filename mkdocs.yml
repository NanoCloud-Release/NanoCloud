site_name: NanoCloud 文档
site_description: NanoCloud 选择、试用、客户端、故障排查、来源与更新
site_url: https://nanocloud-release.readthedocs.io/zh-cn/latest/
repo_url: https://github.com/NanoCloud-Release/NanoCloud
repo_name: NanoCloud-Release/NanoCloud
edit_uri: edit/main/docs/
copyright: 资料会随网络和服务状态变化；付款前请以控制台为准。

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.footer
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
    - content.action.edit
  palette:
    - scheme: default
      primary: green
      accent: orange

nav:
  - 开始这里: index.md
  - 购买前:
      - 2026 网络现状: network.md
      - 按需求选择: buying.md
      - 方案与成本: testing.md
  - 评估 NanoCloud:
      - 套餐与服务边界: nanocloud.md
      - 快速开始与试用: getting-started.md
  - 使用与排障:
      - 常见问题排查: troubleshooting.md
  - 来源与维护: sources.md
  - 产品主页: https://nanocloud-release.github.io/NanoCloud/

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

extra:
  social:
    - icon: fontawesome/solid/house
      link: https://nanocloud-release.github.io/NanoCloud/
      name: NanoCloud 产品主页
    - icon: fontawesome/brands/github
      link: https://github.com/NanoCloud-Release/NanoCloud
      name: GitHub 仓库

extra_css:
  - stylesheets/extra.css
